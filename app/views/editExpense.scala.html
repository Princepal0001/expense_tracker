@(expense: models.Expense)

@main("Edit Expense") {
    <header class="app-header">
        <div>
            <p class="eyebrow">Expense Tracker</p>
            <h1>Edit expense</h1>
        </div>
        <a class="button secondary" href="/expenses">Back</a>
    </header>

    <main class="edit-shell">
        <section class="panel">
            <form method="post" action="/expenses/@expense.id" class="form-stack">
                <label>
                    <span>Title</span>
                    <input type="text" name="title" value="@expense.title" required>
                </label>

                <label>
                    <span>Category</span>
                    <select name="category" required>
                        <option value="Food" @if("Food".equals(expense.category)) {selected}>Food</option>
                        <option value="Transport" @if("Transport".equals(expense.category)) {selected}>Transport</option>
                        <option value="Bills" @if("Bills".equals(expense.category)) {selected}>Bills</option>
                        <option value="Shopping" @if("Shopping".equals(expense.category)) {selected}>Shopping</option>
                        <option value="Health" @if("Health".equals(expense.category)) {selected}>Health</option>
                        <option value="Other" @if("Other".equals(expense.category)) {selected}>Other</option>
                    </select>
                </label>

                <div class="split-fields">
                    <label>
                        <span>Amount</span>
                        <input type="number" name="amount" min="0" step="0.01" value="@expense.amount" required>
                    </label>
                    <label>
                        <span>Date</span>
                        <input type="date" name="expenseDate" value="@expense.expenseDate" required>
                    </label>
                </div>

                <label>
                    <span>Note</span>
                    <textarea name="note" rows="3">@if(expense.note != null) {@expense.note}</textarea>
                </label>

                <button class="button primary full" type="submit">Save changes</button>
            </form>
        </section>
    </main>
}
